<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ZeeApply{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header>
    <nav>
      <a href="/" class="brand">ZeeApply</a>
      <a href="/?status=new">New</a>
      <a href="/?status=interested">Interested</a>
      <a href="/?status=applied">Applied</a>
      <a href="/?status=skipped">Skipped</a>
      <a href="/?status=excluded">Excluded</a>
      <a href="/?status=all">All</a>
      <span class="spacer"></span>
      <a href="/profile">Profile</a>
      <form method="post" action="/fetch" class="inline">
        <button type="submit">Fetch jobs</button>
      </form>
      <form method="post" action="/score" class="inline">
        <button type="submit">Score new</button>
      </form>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
